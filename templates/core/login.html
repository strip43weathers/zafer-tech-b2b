<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zafer Tech | Müşteri Girişi</title>
    <style>
        * { box-sizing: border-box; } /* Kutu modeli düzeltmesi */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        .login-box h2 { color: #0056b3; margin-bottom: 20px; }
        
        /* Input'ları %100 genişliğe ayarladık */
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; outline: none; font-size: 15px;}
        
        .login-box button { background-color: #0056b3; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .login-box button:hover { background-color: #004494; }

        /* Mobil Uyum Kodları (Çok küçük ekranlar için) */
        @media (max-width: 400px) {
            .login-box { padding: 25px 20px; }
            .login-box h2 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>B2B Müşteri Portalı</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Proje takibi için lütfen giriş yapın.</p>
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Kullanıcı Adı" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <button type="submit">Sisteme Giriş Yap</button>
        </form>
        <a href="/" style="display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 13px;">&larr; Ana Sayfaya Dön</a>
    </div>
</body>
</html>
