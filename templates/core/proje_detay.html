<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zafer Tech | {{ proje.baslik }}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; color: #333; }
        .navbar-simple { background-color: #0056b3; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        .navbar-simple a { color: white; text-decoration: none; font-weight: bold; font-size: 16px;}
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        /* Proje Başlığı ve Kategori */
        .page-header { text-align: center; margin-bottom: 40px; }
        .page-header h1 { font-size: 36px; color: #111; margin: 0 0 10px 0; }
        .page-header span { background-color: #e3f2fd; color: #0056b3; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px;}

        /* Galeri Düzeni (Attığın fotoğrafa göre) */
        .gallery-wrapper { display: flex; gap: 20px; background: #1a1a1a; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        /* Sol Taraf: Büyük Ana Görsel */
        .main-image-container { flex: 3; position: relative; border-radius: 8px; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; min-height: 500px;}
        .main-image-container img { max-width: 100%; max-height: 600px; object-fit: contain; transition: opacity 0.3s; }
        
        /* Sağ Taraf: Küçük Fotoğraflar (Thumbnails) */
        .thumbnails-container { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; max-height: 600px; padding-right: 5px; }
        /* Scrollbar stilleri */
        .thumbnails-container::-webkit-scrollbar { width: 6px; }
        .thumbnails-container::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
        
        .thumb-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: 0.3s; opacity: 0.6; }
        .thumb-img:hover { opacity: 1; border-color: #555; }
        .thumb-img.active { opacity: 1; border-color: #00e5ff; }

        /* Proje Detay Metni */
        .project-details { background: white; padding: 40px; border-radius: 12px; margin-top: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .project-details h3 { color: #0056b3; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0;}
        .project-details p { font-size: 16px; line-height: 1.8; color: #555; white-space: pre-line; }

        @media (max-width: 900px) {
            .gallery-wrapper { flex-direction: column; }
            .thumbnails-container { flex-direction: row; overflow-x: auto; max-height: 150px; }
            .thumb-img { width: 150px; height: 100px; }
            .main-image-container { min-height: 300px; }
        }
    </style>
</head>
<body>

    <nav class="navbar-simple">
        <a href="/">⚡ ZAFER TECH</a>
        <a href="/">&larr; Projelere Dön</a>
    </nav>

    <div class="container">
        <div class="page-header">
            <span>{{ proje.kategori.ad }}</span>
            <h1>{{ proje.baslik }}</h1>
        </div>

        <div class="gallery-wrapper">
            <div class="main-image-container">
                <img id="mainImage" src="{% if proje.fotograflar.first %}{{ proje.fotograflar.first.gorsel.url }}{% else %}{{ proje.gorsel_url }}{% endif %}" alt="{{ proje.baslik }}">
            </div>

            <div class="thumbnails-container">
                {% for foto in proje.fotograflar.all %}
                    <img src="{{ foto.gorsel.url }}" class="thumb-img {% if forloop.first %}active{% endif %}" onclick="changeImage(this)">
                {% endfor %}
            </div>
        </div>

        <div class="project-details">
            <h3>Proje Detayları ve Uygulamalar</h3>
            <p>{{ proje.aciklama }}</p>
        </div>
    </div>

    <script>
        function changeImage(element) {
            // Ana resmi değiştir
            document.getElementById('mainImage').src = element.src;
            
            // Tüm thumbnaillerden active sınıfını kaldır
            const thumbs = document.querySelectorAll('.thumb-img');
            thumbs.forEach(thumb => thumb.classList.remove('active'));
            
            // Tıklanan thumbnail'e active sınıfını ekle (Mavi çerçeve için)
            element.classList.add('active');
        }
    </script>
</body>
</html>
