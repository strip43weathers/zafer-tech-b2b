{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zafer Tech | {{ yazi.baslik }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; } 
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; margin: 0; color: #333; }
        
        .pro-navbar { background-color: #fff; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .pro-navbar a { color: #0056b3; text-decoration: none; font-weight: bold; font-size: 20px;}
        .pro-navbar a.back-link { font-size: 14px; color:#555; }
        
        .container { max-width: 800px; margin: 50px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .blog-header { text-align: center; margin-bottom: 30px; }
        .blog-date { color: #888; font-size: 14px; display: block; margin-bottom: 10px;}
        .blog-title { color: #111; font-size: 32px; margin: 0 0 20px 0; line-height: 1.3; }
        .blog-main-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 10px; margin-bottom: 30px; }
        
        /* DÜZELTİLDİ: white-space: pre-line; kaldırıldı çünkü CKEditor zaten kendi HTML yapısını kuruyor */
        .blog-body { font-size: 16px; line-height: 1.8; color: #444; word-wrap: break-word; }
        
        /* CKEditor içinden eklenen fotoğrafların mobilde taşmasını engellemek için ufak bir ayar */
        .blog-body img { max-width: 100%; height: auto; border-radius: 8px; }

        /* Mobil Uyum Kodları */
        @media (max-width: 768px) {
            .container { margin: 20px; padding: 20px; }
            .blog-title { font-size: 24px; }
            .blog-main-img { max-height: 250px; margin-bottom: 20px; }
            .pro-navbar { padding: 15px 5%; flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <nav class="pro-navbar">
        <a href="/">⚡ ZAFER TECH</a>
        <a href="{% url 'blog_liste' %}" class="back-link">&larr; Bloglara Dön</a>
    </nav>

    <div class="container">
        <div class="blog-header">
            <span class="blog-date">{{ yazi.olusturulma_tarihi|date:"d F Y, H:i" }}</span>
            <h1 class="blog-title">{{ yazi.baslik }}</h1>
        </div>

        {% if yazi.gorsel %}
            <img src="{{ yazi.gorsel.url }}" alt="{{ yazi.baslik }}" class="blog-main-img">
        {% endif %}

        <div class="blog-body">
            <!-- DÜZELTİLDİ: |safe filtresi eklendi -->
            {{ yazi.icerik|safe }}
        </div>
    </div>

</body>
</html>
